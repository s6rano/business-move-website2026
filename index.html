<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Business Move</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="/identity/logo_bm_transparent_white_512.png">
    <link rel="alternate" hreflang="fr" href="https://businessmove.eu/fr/">
    <link rel="alternate" hreflang="nl" href="https://businessmove.eu/nl/">
    <link rel="alternate" hreflang="en" href="https://businessmove.eu/en/">
    <link rel="alternate" hreflang="x-default" href="https://businessmove.eu/">
    <script>
      (function () {
        var supported = ["fr","nl","en"];
        var stored = null;
        try { stored = localStorage.getItem("bm.lang"); } catch (e) {}
        var nav = (navigator.language || navigator.userLanguage || "fr").slice(0, 2).toLowerCase();
        var lang = supported.indexOf(stored) >= 0 ? stored : (supported.indexOf(nav) >= 0 ? nav : "fr");
        window.location.replace("/" + lang + "/");
      })();
    </script>
  </head>
  <body>
    <p>Business Move — <a href="/fr/">Français</a> · <a href="/nl/">Nederlands</a> · <a href="/en/">English</a></p>
  </body>
</html>
